// ─── MARKDOWN RENDERER ────────────────────────────────────────
function MD({text}) {
  if(!text) return null;
  return React.createElement("div",{style:{fontSize:"14px",lineHeight:"1.9",color:"#c8d8c0"}},
    text.split("\n").map((line,i)=>{
      if(!line.trim()) return React.createElement("div",{key:i,style:{height:"0.5em"}});
      const isBullet=/^[\s]*[-*]\s/.test(line)||/^[\s]*\d+\.\s/.test(line);
      const isHash=line.trim().startsWith("#");
      const render=t=>t.replace(/\*\*(.*?)\*\*/g,(_,b)=>`<strong style="color:#e8f0e0;font-weight:600">${b}</strong>`);
      if(isHash) return React.createElement("div",{key:i,style:{marginTop:"6px"},dangerouslySetInnerHTML:{__html:`<span style="color:#4a9e6e;font-size:13px">${render(line)}</span>`}});
      if(isBullet){
        const c=line.replace(/^[\s]*[-*]\s/,"").replace(/^[\s]*\d+\.\s/,"");
        return React.createElement("div",{key:i,style:{display:"flex",gap:"10px",marginBottom:"5px",paddingLeft:"4px"}},
          React.createElement("span",{style:{color:"#4a9e6e",flexShrink:0}},"-"),
          React.createElement("span",{dangerouslySetInnerHTML:{__html:render(c)}}));
      }
      return React.createElement("div",{key:i,dangerouslySetInnerHTML:{__html:render(line)}});
    })
  );
}

}

      sessions.push({topic:t.substring(0,100),style:s,industry:ind,rating:r,time:new Date().toISOString()});

  // ─── API CALL ──────────────────────────────────────────────
  async function callGemini(userMsg, sysOverride) {
    const sys = sysOverride||buildPrompt(industry,style);
    const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${GEMINI_KEY}`;
    const body = {
      systemInstruction:{parts:[{text:sys}]},
      contents:[{role:"user",parts:[{text:userMsg}]}],
      generationConfig:{maxOutputTokens:1400,temperature:0.88}
    };
    const r = await fetch(url,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
    if(!r.ok) throw new Error("API error "+r.status);
    const d = await r.json();
    return d.candidates?.[0]?.content?.parts?.[0]?.text||"";
  }
